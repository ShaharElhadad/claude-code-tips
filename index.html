<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Tips | טיפים יומיים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fafaf9;
  --card:#fff;
  --ink:#111;
  --ink-soft:#444;
  --ink-muted:#888;
  --border:#e8e8e3;
  --accent:#c44b25;
  --radius:10px;
}
body{
  font-family:'Heebo',sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.7;
  min-height:100vh;
}
.wrapper{
  max-width:720px;
  margin:0 auto;
  padding:3rem 1.5rem 4rem;
}
.header{
  text-align:center;
  margin-bottom:3rem;
}
.header h1{
  font-size:2rem;
  font-weight:800;
  letter-spacing:-.02em;
  margin-bottom:.5rem;
}
.header p{
  color:var(--ink-muted);
  font-size:1rem;
}
.dash-link{
  display:inline-flex;
  align-items:center;
  gap:.4rem;
  margin-top:.75rem;
  color:var(--accent);
  text-decoration:none;
  font-size:.85rem;
  font-weight:500;
  border:1px solid var(--accent);
  padding:.35rem .85rem;
  border-radius:6px;
  transition:all .2s;
}
.dash-link:hover{background:var(--accent);color:#fff}
.tips-list{display:flex;flex-direction:column;gap:1rem}
.tip-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1.5rem;
  text-decoration:none;
  color:inherit;
  display:block;
  transition:all .2s;
}
.tip-card:hover{
  border-color:var(--accent);
  box-shadow:0 2px 12px rgba(196,75,37,.08);
  transform:translateY(-1px);
}
.tip-num{
  font-size:.75rem;
  font-weight:600;
  color:var(--accent);
  text-transform:uppercase;
  letter-spacing:.05em;
  margin-bottom:.25rem;
}
.tip-card h2{
  font-size:1.15rem;
  font-weight:700;
  margin-bottom:.4rem;
}
.tip-card p{
  color:var(--ink-muted);
  font-size:.9rem;
}
footer{
  text-align:center;
  margin-top:3rem;
  padding-top:1.5rem;
  border-top:1px solid var(--border);
  font-size:.8rem;
  color:var(--ink-muted);
}
footer a{color:var(--accent);text-decoration:none;font-weight:500}
footer a:hover{text-decoration:underline}
@media(max-width:640px){
  .wrapper{padding:2rem 1rem 3rem}
  .header h1{font-size:1.65rem}
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>Claude Code Tips</h1>
    <p>טיפים יומיים בעברית פשוטה, גם למי שלא טכנולוגי</p>
    <a href="dashboard.html" class="dash-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
  </div>

  <div class="tips-list">
    <a href="tips/tip-1-refactoring.html" class="tip-card">
      <div class="tip-num">טיפ #1</div>
      <h2>Code Refactoring עם Claude Code</h2>
      <p>מה זה Refactoring ואיך Claude Code עושה את זה בשבילך, בשפה פשוטה</p>
    </a>
  </div>

  <footer>
    <p>By <a href="https://www.instagram.com/shahar_elhadad" target="_blank">Shahar Elhadad</a></p>
  </footer>
</div>
</body>
</html>
